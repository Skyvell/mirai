name: Deploy frontend

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

concurrency:
  group: frontend-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      # Bakes the committed frontend/.env (public VITE_* build config) into the bundle.
      - name: Build
        run: pnpm build

      # Cloudflare gets only a Pages-scoped API token — no access to this repo.
      # Run wrangler via npx: it fetches into npm's cache instead of installing into
      # frontend/'s pnpm-managed node_modules (which breaks both pnpm's build-script gate
      # and npm's tree parser). Create the project on first run (`|| true` keeps reruns
      # idempotent), then upload the built dist/ (cwd is frontend/ per job defaults).
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@4.107.0 pages project create mirai-web --production-branch=main || true
          npx --yes wrangler@4.107.0 pages deploy dist --project-name=mirai-web
