name: Deploy frontend

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

concurrency:
  group: frontend-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  WRANGLER_VERSION: "4.107.0"
  PAGES_PROJECT: "mirai-web"

jobs:
  release:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      # Bakes the committed frontend/.env (public VITE_* build config) into the bundle.
      - name: Build
        run: pnpm build

      # npx (not a pnpm/npm install) keeps wrangler out of frontend/'s pnpm node_modules.
      # Cloudflare gets only a Pages-scoped token. Create the project on first run
      # (|| true = idempotent), then upload dist/.
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@${{ env.WRANGLER_VERSION }} pages project create ${{ env.PAGES_PROJECT }} --production-branch=main || true
          npx --yes wrangler@${{ env.WRANGLER_VERSION }} pages deploy dist --project-name=${{ env.PAGES_PROJECT }}
