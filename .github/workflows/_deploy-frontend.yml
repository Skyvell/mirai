name: Deploy frontend

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

concurrency:
  group: frontend-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      # Bakes the committed frontend/.env (public VITE_* build config) into the bundle.
      - name: Build
        run: pnpm build

      # Cloudflare gets only a Pages-scoped API token — no access to this repo.
      # preCommands creates the project on first run; the `|| true` makes reruns idempotent.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: frontend
          preCommands: wrangler pages project create mirai-web --production-branch=main || true
          command: pages deploy dist --project-name=mirai-web
