name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-infrastructure:
    uses: ./.github/workflows/_deploy-infrastructure.yml
    with:
      environment: dev

  deploy-app:
    needs: deploy-infrastructure
    uses: ./.github/workflows/_deploy-app.yml
    with:
      environment: dev

  deploy-frontend:
    uses: ./.github/workflows/_deploy-frontend.yml
    with:
      environment: dev
